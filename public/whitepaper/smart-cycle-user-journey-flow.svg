<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">Пользовательский путь внутри Smart Cycle-1</title>
  <desc id="desc">Блок-схема пути участника: подключение кошелька, изучение параметров, создание order, ожидание условий, Claim и проверка через explorer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset=".58" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity=".13"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#0f766e"/>
    </marker>
    <style>
      .title{font:900 40px Inter,Arial,sans-serif;fill:#0f172a}
      .subtitle{font:700 18px Inter,Arial,sans-serif;fill:#475569}
      .step{font:900 20px Inter,Arial,sans-serif;fill:#0f172a}
      .body{font:700 14px Inter,Arial,sans-serif;fill:#475569}
      .tag{font:900 13px Inter,Arial,sans-serif;fill:#0f766e;letter-spacing:.08em;text-transform:uppercase}
      .warn{font:900 15px Inter,Arial,sans-serif;fill:#b45309}
      .line{stroke:#0f766e;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .softline{stroke:#fb923c;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1440" height="760" rx="34" fill="url(#bg)"/>
  <text x="76" y="82" class="title">4.3 Пользовательский путь внутри Smart Cycle-1</text>
  <text x="76" y="122" class="subtitle">От подключения кошелька до проверки Claim: каждый шаг должен быть понятен до подписи транзакции.</text>

  <g filter="url(#shadow)">
    <g transform="translate(80 185)">
      <rect width="250" height="124" rx="22" fill="#fff" stroke="#fed7aa"/>
      <text x="28" y="36" class="tag">Step 1</text>
      <text x="28" y="68" class="step">Wallet connect</text>
      <text x="28" y="98" class="body">Участник подключает</text>
      <text x="28" y="118" class="body">Web3-кошелек.</text>
    </g>
    <g transform="translate(390 185)">
      <rect width="250" height="124" rx="22" fill="#fff" stroke="#fed7aa"/>
      <text x="28" y="36" class="tag">Step 2</text>
      <text x="28" y="68" class="step">Параметры</text>
      <text x="28" y="98" class="body">Сумма, срок, дельта,</text>
      <text x="28" y="118" class="body">fee, Claim и риски.</text>
    </g>
    <g transform="translate(700 185)">
      <rect width="250" height="124" rx="22" fill="#fff" stroke="#fed7aa"/>
      <text x="28" y="36" class="tag">Step 3</text>
      <text x="28" y="68" class="step">Сумма участия</text>
      <text x="28" y="98" class="body">Пользователь выбирает</text>
      <text x="28" y="118" class="body">доступный flow.</text>
    </g>
    <g transform="translate(1010 185)">
      <rect width="290" height="124" rx="22" fill="#fff" stroke="#fed7aa"/>
      <text x="28" y="36" class="tag">Step 4</text>
      <text x="28" y="68" class="step">Wallet confirmation</text>
      <text x="28" y="98" class="body">Транзакция подтверждается</text>
      <text x="28" y="118" class="body">только в кошельке.</text>
    </g>
  </g>

  <path class="line" d="M330 247H384"/>
  <path class="line" d="M640 247H694"/>
  <path class="line" d="M950 247H1004"/>

  <path class="softline" d="M1155 309V385"/>

  <g filter="url(#shadow)">
    <g transform="translate(970 405)">
      <rect width="330" height="124" rx="22" fill="#fff" stroke="#bbf7d0"/>
      <text x="28" y="36" class="tag">Step 5</text>
      <text x="28" y="68" class="step">On-chain order</text>
      <text x="28" y="98" class="body">Действие фиксируется</text>
      <text x="28" y="118" class="body">в интерфейсе и блокчейне.</text>
    </g>
    <g transform="translate(620 405)">
      <rect width="290" height="124" rx="22" fill="#fff" stroke="#bbf7d0"/>
      <text x="28" y="36" class="tag">Step 6</text>
      <text x="28" y="68" class="step">Ожидание условий</text>
      <text x="28" y="98" class="body">Lock period или иной</text>
      <text x="28" y="118" class="body">режим выбранного flow.</text>
    </g>
    <g transform="translate(310 405)">
      <rect width="250" height="124" rx="22" fill="#fff" stroke="#bfdbfe"/>
      <text x="28" y="36" class="tag">Step 7</text>
      <text x="28" y="68" class="step">Claim</text>
      <text x="28" y="98" class="body">Участник инициирует</text>
      <text x="28" y="118" class="body">запрос помощи.</text>
    </g>
    <g transform="translate(80 405)">
      <path d="M115 0 L230 62 L115 124 L0 62 Z" fill="#fff" stroke="#fbbf24" stroke-width="2"/>
      <text x="58" y="55" class="step">Ликвидность</text>
      <text x="76" y="82" class="step">доступна?</text>
    </g>
  </g>

  <path class="line" d="M970 467H916"/>
  <path class="line" d="M620 467H566"/>
  <path class="line" d="M310 467H304"/>
  <path class="line" d="M195 529V590"/>

  <g filter="url(#shadow)">
    <g transform="translate(80 610)">
      <rect width="330" height="86" rx="22" fill="#ecfdf5" stroke="#bbf7d0"/>
      <text x="28" y="36" class="step">Claim исполнен</text>
      <text x="28" y="64" class="body">Перевод и события проверяются on-chain.</text>
    </g>
    <g transform="translate(480 610)">
      <rect width="360" height="86" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="28" y="36" class="step">Claim ожидает условий</text>
      <text x="28" y="64" class="body">Если условий или ликвидности недостаточно.</text>
    </g>
    <g transform="translate(910 610)">
      <rect width="390" height="86" rx="22" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="28" y="36" class="step">Explorer / Contract Registry</text>
      <text x="28" y="64" class="body">Проверка tx hash, адресов, статуса и событий.</text>
    </g>
  </g>

  <path class="line" d="M410 653H474"/>
  <path class="line" d="M840 653H904"/>

  <rect x="80" y="708" width="1220" height="38" rx="19" fill="#dcfce7"/>
  <text x="112" y="733" class="warn">Правило:</text>
  <text x="184" y="733" class="body">перед подписью пользователь сверяет сеть, адреса, токен, сумму, условия Claim и официальные источники Atlas.</text>
</svg>
