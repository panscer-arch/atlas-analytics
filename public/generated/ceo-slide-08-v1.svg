<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="amberCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1135 306) rotate(124) scale(760 620)">
      <stop stop-color="#ff7a00" stop-opacity=".36"/>
      <stop offset=".46" stop-color="#ff9d24" stop-opacity=".12"/>
