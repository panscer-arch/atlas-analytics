        <div class="body"></div>
        <div class="turtleneck"></div>
        <div class="lapel-left"></div>
        <div class="lapel-right"></div>
        <div class="hair"></div>
        <div class="head"></div>
        <div class="face-light"></div>
        <div class="glass"></div>
      </div>
      <div class="code-panel" aria-hidden="true">
        <div class="code-title">Smart Contract / Rules</div>
        <div class="code-line"></div>
        <div class="code-line"></div>
        <div class="code-line"></div>
        <div class="code-line"></div>
        <div class="code-line"></div>
      </div>
      <div class="principles">
        <div class="principle"><span>01</span><strong>Код</strong></div>
        <div class="principle"><span>02</span><strong>Правила</strong></div>
        <div class="principle"><span>03</span><strong>Механика</strong></div>
        <div class="principle"><span>04</span><strong>Сообщество</strong></div>
      </div>
