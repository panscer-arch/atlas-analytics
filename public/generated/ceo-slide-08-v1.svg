            linear-gradient(135deg, #f3eadb, #514d46);
          box-shadow: inset 0 -42px 72px rgba(0,0,0,.78), 0 38px 70px rgba(0,0,0,.5);
        }
        .turtleneck {
          position: absolute;
          left: 164px;
          top: 204px;
          width: 104px;
          height: 300px;
          border-radius: 48px 48px 18px 18px;
          background: linear-gradient(180deg, rgba(235,229,218,.34), rgba(21,20,19,.92));
          box-shadow: inset 0 0 36px rgba(0,0,0,.7);
        }
        .lapel-left,
        .lapel-right {
          position: absolute;
          top: 262px;
          width: 102px;
          height: 285px;
          background: rgba(255,255,255,.18);
          border: 1px solid rgba(255,255,255,.22);
          box-shadow: inset 0 0 28px rgba(255,255,255,.08);
        }
        .lapel-left {
          left: 92px;
          transform: skewX(-12deg);
          border-radius: 22px 6px 18px 28px;
        }
        .lapel-right {
          right: 92px;
          transform: skewX(12deg);
          border-radius: 6px 22px 28px 18px;
        }
        .glass {
          position: absolute;
          left: 70px;
          top: 20px;
          width: 288px;
          height: 646px;
          border: 1px solid rgba(255, 168, 70, .22);
          border-radius: 28px;
          background: linear-gradient(90deg, rgba(255,255,255,.02), rgba(255,122,0,.06), rgba(255,255,255,.01));
          backdrop-filter: blur(1px);
        }
        .code-panel {
          position: absolute;
          z-index: 2;
          right: 55px;
          top: 170px;
          width: 385px;
          min-height: 260px;
          border: 1px solid rgba(255, 122, 0, .24);
          border-radius: 26px;
          padding: 24px;
          background: rgba(5, 9, 15, .72);
          box-shadow: inset 0 0 42px rgba(255, 122, 0, .06);
        }
        .code-title {
          color: #ff9c38;
          font-size: 18px;
          font-weight: 950;
          letter-spacing: 5px;
          text-transform: uppercase;
        }
        .code-line {
          height: 14px;
          margin-top: 18px;
          border-radius: 999px;
          background: linear-gradient(90deg, rgba(255, 122, 0, .86), rgba(255, 181, 71, .26), transparent);
        }
        .code-line:nth-child(3) { width: 82%; }
        .code-line:nth-child(4) { width: 67%; }
        .code-line:nth-child(5) { width: 90%; }
        .code-line:nth-child(6) { width: 56%; }
        .principles {
          position: absolute;
          z-index: 4;
          left: 46px;
          bottom: 42px;
          display: grid;
          grid-template-columns: repeat(4, minmax(0, 1fr));
          gap: 15px;
          width: 890px;
        }
        .principle {
          min-height: 118px;
          border: 1px solid rgba(255,255,255,.13);
          border-radius: 22px;
          padding: 18px;
          background: rgba(255,255,255,.05);
          box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
        }
        .principle span {
          color: #ff9c38;
          font-size: 17px;
          font-weight: 950;
          letter-spacing: 5px;
          text-transform: uppercase;
        }
        .principle strong {
          display: block;
          margin-top: 10px;
          color: #f6f8ff;
          font-size: 29px;
          line-height: 1;
          font-weight: 950;
        }
        .quote {
          position: absolute;
          z-index: 5;
          left: 46px;
          top: 330px;
          width: 560px;
          color: #f6f8ff;
          font-size: 43px;
          line-height: 1.03;
          font-weight: 950;
        }
        .quote b {
          color: #ff8a1f;
        }
      </style>
      <div class="top">
        <div>
          <span class="kicker">Atlas System</span>
          <h1>Почему я скрываю своё лицо</h1>
          <div class="subtitle">Atlas — это система, а не культ личности</div>
        </div>
        <div class="badge">Slide 08</div>
      </div>
      <div class="quote">Система должна быть <b>сильнее</b> личности</div>
      <div class="architect" aria-hidden="true">
