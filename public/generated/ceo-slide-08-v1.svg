  <foreignObject x="58" y="55" width="1484" height="792" filter="url(#cardShadow)">
    <div xmlns="http://www.w3.org/1999/xhtml" class="slide">
      <style>
        .slide {
          box-sizing: border-box;
          position: relative;
          width: 1484px;
          height: 792px;
          overflow: hidden;
          border: 1px solid rgba(255, 122, 0, .28);
          border-radius: 34px;
          padding: 42px 46px;
          color: #f5f8ff;
          font-family: Inter, Arial, Helvetica, sans-serif;
          background:
            radial-gradient(circle at 70% 42%, rgba(255, 122, 0, .16), transparent 34%),
            linear-gradient(135deg, rgba(18, 27, 42, .90), rgba(6, 9, 14, .78) 48%, rgba(15, 11, 9, .94));
        }
        .top {
          position: relative;
          z-index: 4;
          display: flex;
          justify-content: space-between;
          gap: 32px;
          align-items: flex-start;
        }
        .kicker {
          display: block;
          color: #ff8a1f;
          font-size: 24px;
          font-weight: 950;
          letter-spacing: 9px;
          text-transform: uppercase;
        }
        h1 {
          margin: 16px 0 0;
          max-width: 670px;
          font-size: 75px;
          line-height: .94;
          letter-spacing: 0;
          font-weight: 950;
        }
        .subtitle {
          max-width: 690px;
          margin-top: 20px;
          color: #cfd9e8;
          font-size: 30px;
          line-height: 1.18;
          font-weight: 760;
        }
        .badge {
          min-width: 150px;
          border: 1px solid rgba(255, 122, 0, .34);
          border-radius: 24px;
          padding: 18px 22px;
          background: rgba(255, 122, 0, .10);
          color: #ffd3a0;
          text-align: center;
          font-size: 24px;
          font-weight: 900;
        }
        .architect {
          position: absolute;
          z-index: 3;
          left: 590px;
          bottom: 0;
          width: 430px;
          height: 700px;
          opacity: .99;
        }
        .head {
          position: absolute;
          left: 150px;
          top: 46px;
          width: 128px;
          height: 154px;
          border-radius: 52% 48% 46% 54%;
          background:
            radial-gradient(circle at 52% 16%, rgba(255, 221, 176, .24), transparent 22%),
            linear-gradient(145deg, #151c25, #05080d 64%, #010204);
          box-shadow: inset 0 -26px 38px rgba(0, 0, 0, .92), 0 0 46px rgba(255, 122, 0, .18);
        }
        .hair {
          position: absolute;
          left: 132px;
          top: 22px;
          width: 165px;
          height: 74px;
          border-radius: 56% 44% 45% 55%;
          background: linear-gradient(145deg, #2d251e, #090807 60%, #020202);
          box-shadow: 0 0 22px rgba(255, 156, 56, .10);
        }
        .face-light {
          position: absolute;
          left: 207px;
          top: 63px;
          width: 24px;
          height: 128px;
          border-radius: 999px;
          background: linear-gradient(180deg, rgba(255, 204, 148, .28), rgba(255, 122, 0, .02));
          filter: blur(5px);
        }
        .body {
          position: absolute;
          left: 82px;
          top: 196px;
          width: 268px;
          height: 470px;
          border-radius: 108px 108px 28px 28px;
          background:
            linear-gradient(90deg, rgba(255,255,255,.72), rgba(214,207,194,.92) 32%, rgba(50,50,47,.84) 50%, rgba(220,213,198,.88) 68%, rgba(255,255,255,.68)),
            linear-gradient(145deg, #f4eee4, #7c776f 56%, #151514);
          box-shadow: inset 0 -54px 72px rgba(0, 0, 0, .78), 0 34px 64px rgba(0, 0, 0, .52);
        }
        .shoulder {
          position: absolute;
          left: 2px;
          top: 330px;
          width: 426px;
          height: 282px;
          border-radius: 48% 52% 18% 18%;
