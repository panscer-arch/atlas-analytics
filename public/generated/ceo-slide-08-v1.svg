    <radialGradient id="blueEdge" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 760) rotate(-26) scale(760 440)">
      <stop stop-color="#2f76ff" stop-opacity=".18"/>
