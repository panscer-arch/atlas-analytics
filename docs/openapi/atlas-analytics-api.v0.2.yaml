  /traffic:
    get:
      tags: [traffic]
      operationId: getTraffic
      summary: Live website/cabinet traffic, funnel and conversion.
      parameters:
        - $ref: "#/components/parameters/dateRange"
        - $ref: "#/components/parameters/segment"
        - $ref: "#/components/parameters/product"
        - $ref: "#/components/parameters/country"
        - $ref: "#/components/parameters/network"
      responses:
        "200":
          description: Traffic analytics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrafficResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
