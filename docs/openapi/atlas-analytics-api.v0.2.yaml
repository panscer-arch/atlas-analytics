  /base-composition:
    get:
      tags: [base-composition]
      operationId: getBaseComposition
      summary: User base composition by role, lifecycle and value tiers.
      parameters:
        - $ref: "#/components/parameters/dateRange"
        - $ref: "#/components/parameters/segment"
