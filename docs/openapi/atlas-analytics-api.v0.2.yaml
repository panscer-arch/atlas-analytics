openapi: 3.1.0
info:
  title: Atlas Analytics API
  version: 0.2.0
  summary: Read-only analytics contract for Atlas frontend and Atlas Agents.
  description: |
    Draft v0.2 contract for the Atlas analytics backend/API-gateway.

    Current status:
    - The atlas-analytics frontend already expects these 12 analytics endpoints.
    - Atlas Agents should use /meta to discover valid filter values before asking data questions.
    - This specification fixes the external contract for backend and Atlas Agents alignment.
    - All endpoints are read-only and require a scoped Bearer token.
    - All data endpoints may return extra fields for forward compatibility; strict clients should preserve
      unknown fields in an extra dict instead of failing.
    - All endpoints may return 429 if the service account exceeds the agreed limit.
    - Atlas Agents production IP planned for whitelist: 187.127.88.96.

    Data source is intentionally not fixed here: implementation may aggregate PUP Postgres,
    Atlas Web3 API, on-chain data, or an internal analytics warehouse.
servers:
  - url: https://analytics-api.pupanel.cc/api/admin/analytics
    description: Planned production namespace
  - url: http://127.0.0.1:3100/api/admin/analytics
    description: Local development placeholder

security:
  - bearerAuth:
      - analytics:read

tags:
  - name: meta
  - name: overview
  - name: cash
  - name: obligations
  - name: plan-fact
  - name: orders
  - name: wallets
  - name: partner-structure
  - name: reinvest
  - name: leaders
  - name: geography
  - name: traffic
  - name: base-composition

paths:
  /meta:
    get:
      tags: [meta]
      operationId: getAnalyticsMeta
      summary: Discover valid filter values and API capabilities.
      description: Agents should call this endpoint before composing filtered analytics requests.
      security:
        - bearerAuth:
            - analytics:read
      responses:
        "200":
          description: Available filters, scopes and rate-limit metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetaResponse"
              examples:
                default:
                  value:
                    generatedAt: "2026-05-21T09:00:00Z"
                    dateRanges: ["1d", "today", "yesterday", "7d", "30d", "90d", "mtd", "qtd", "ytd"]
                    products: ["all", "unity_lockup", "unity_daily"]
                    segments: ["all", "Инвесторы", "Партнёры", "Инвесторы + партнёры"]
                    countries: ["Great Britain", "Germany", "Kazakhstan", "UAE", "Turkey"]
                    networks: ["BNB", "ETH", "Polygon", "Tron"]
                    defaultDateRange: "30d"
                    rateLimit:
                      requestsPerDay: 1000
                      burstPerMinute: 60
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /overview:
    get:
      tags: [overview]
      operationId: getAnalyticsOverview
      summary: High-level KPI snapshot and dashboard summary.
      parameters:
        - $ref: "#/components/parameters/dateRange"
        - $ref: "#/components/parameters/segment"
        - $ref: "#/components/parameters/product"
        - $ref: "#/components/parameters/country"
        - $ref: "#/components/parameters/network"
      responses:
        "200":
          description: Overview snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverviewResponse"
              examples:
                default:
                  value:
                    generatedAt: "2026-05-21T09:00:00Z"
                    source: analytics-warehouse
                    summary:
                      headline: "Покрытие обязательств на 7 дней в зелёной зоне"
                      description: "Входящий поток сегодня перекрывает ближайшие выплаты, но нагрузка по партнёрским начислениям растёт."
                      bullets:
                        - "Входящий поток сегодня: $128500"
                        - "Обязательства 7 дней: $420000"
                        - "Первой риск-даты сейчас нет"
                      topMetrics:
                        - title: "Входящий поток"
                          value: 128500
                          displayValue: "$128 500"
                          variant: currency
                    kpi:
                      incomingToday: 128500
                      factToday: 128500
                      outgoingToday: 76000
                      contractNetFlowToday: 52500
                      planToday: 120000
                      gapToday: 8500
                      obligations7d: 420000
                      obligations30d: 1840000
                      coverage7d: 74
                      coverage30d: 62
                      firstRiskDate: null
                      noRisk: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /cash-position:
    get:
      tags: [cash]
      operationId: getCashPosition
      summary: Daily incoming/outgoing cash position.
      parameters:
        - $ref: "#/components/parameters/dateRange"
        - $ref: "#/components/parameters/segment"
        - $ref: "#/components/parameters/product"
        - $ref: "#/components/parameters/country"
        - $ref: "#/components/parameters/network"
      responses:
        "200":
          description: Cash position by day.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CashPositionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /obligations:
    get:
      tags: [obligations]
      operationId: getObligations
      summary: Future obligations and payout pressure.
      parameters:
        - $ref: "#/components/parameters/dateRange"
        - $ref: "#/components/parameters/segment"
        - $ref: "#/components/parameters/product"
        - $ref: "#/components/parameters/country"
        - $ref: "#/components/parameters/network"
      responses:
        "200":
          description: Obligation windows and rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObligationsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /plan-fact:
    get:
      tags: [plan-fact]
      operationId: getPlanFact
      summary: Plan/fact comparison for incoming flow.
      parameters:
        - $ref: "#/components/parameters/dateRange"
        - $ref: "#/components/parameters/segment"
        - $ref: "#/components/parameters/product"
        - $ref: "#/components/parameters/country"
        - $ref: "#/components/parameters/network"
      responses:
        "200":
          description: Plan/fact rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanFactResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /orders:
    get:
      tags: [orders]
      operationId: getOrders
      summary: Orders, cycles, claims, transactions and product breakdown.
      parameters:
        - $ref: "#/components/parameters/dateRange"
        - $ref: "#/components/parameters/segment"
        - $ref: "#/components/parameters/product"
        - $ref: "#/components/parameters/country"
        - $ref: "#/components/parameters/network"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Order and product breakdown.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrdersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /wallets:
    get:
      tags: [wallets]
      operationId: getWallets
      summary: Wallet inflow, obligations, claim pressure and risk.
      parameters:
        - $ref: "#/components/parameters/dateRange"
        - $ref: "#/components/parameters/segment"
        - $ref: "#/components/parameters/product"
        - $ref: "#/components/parameters/country"
        - $ref: "#/components/parameters/network"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Wallet analytics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /partner-structure:
    get:
      tags: [partner-structure]
      operationId: getPartnerStructure
      summary: Partner branches, referral accruals, payouts and structural risks.
      parameters:
        - $ref: "#/components/parameters/dateRange"
        - $ref: "#/components/parameters/segment"
        - $ref: "#/components/parameters/product"
        - $ref: "#/components/parameters/country"
        - $ref: "#/components/parameters/network"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Partner structure analytics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerStructureResponse"
              examples:
                default:
                  value:
                    generatedAt: "2026-05-21T09:00:00Z"
                    source: analytics-warehouse
                    summary:
                      headline: "North Star лидирует по притоку, но зависимость от лидера повышена"
                      description: "Ветка даёт максимальный новый поток, при этом концентрация на одном лидере требует наблюдения."
                      bullets:
                        - "Начислено партнёрам: $18400"
                        - "Выплачено партнёрам: $12100"
                        - "Топ ветка: North Star"
                      topMetrics:
                        - title: "Приток ветки"
                          value: 91000
                          displayValue: "$91 000"
                          variant: currency
                    pagination:
                      limit: 500
                      offset: 0
                      total: 42
                      nextOffset: null
                    rows:
                      - leader: "North Star"
                        branch: "North Star"
                        generatedInflow: 91000
                        inflow: 91000
                        invited: 320
                        activeInvited: 180
                        depositingInvited: 94
                        referralAccrual: 18400
                        referralPaid: 12100
                        payout: 12100
                        downlineObligations: 238000
                        obligations: 238000
                        creatorFlow: 8600
                        leaderDependency: 67
                        depthScore: 58
                        conversionToDeposit: 29.4
                        structuralLeak: 34
                        netContribution: 54600
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /reinvest:
    get:
      tags: [reinvest]
      operationId: getReinvest
      summary: Reinvest behavior by product and geography.
      parameters:
        - $ref: "#/components/parameters/dateRange"
        - $ref: "#/components/parameters/segment"
        - $ref: "#/components/parameters/product"
        - $ref: "#/components/parameters/country"
        - $ref: "#/components/parameters/network"
      responses:
        "200":
          description: Reinvest analytics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReinvestResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
