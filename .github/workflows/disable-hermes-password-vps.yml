name: Disable Hermes Password on VPS

on:
  workflow_dispatch:

jobs:
  disable-hermes-password:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/deploy_key
          ${{ secrets.VPS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key

      - name: Disable Basic Auth for Hermes
        shell: bash
        timeout-minutes: 3
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=25 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=3 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'bash -s' <<'REMOTE'
          set -euo pipefail

          sudo rm -f /etc/nginx/conf.d/hermes-remember-map.conf

          NGINX_FILES="$(sudo grep -rlE 'location /hermes/' /etc/nginx/sites-enabled /etc/nginx/conf.d 2>/dev/null || true)"
          if [ -z "$NGINX_FILES" ]; then
            echo "No nginx file with location /hermes/ found" >&2
            exit 1
          fi

          for NGINX_FILE in $NGINX_FILES; do
            sudo python3 - "$NGINX_FILE" <<'PY'
          import re
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          text = path.read_text(encoding="utf-8")
          marker = "location /hermes/ {"
          start = text.find(marker)
          if start == -1:
              raise SystemExit(0)

          depth = 0
          end = None
          for index in range(start, len(text)):
              if text[index] == "{":
                  depth += 1
              elif text[index] == "}":
                  depth -= 1
                  if depth == 0:
                      end = index
                      break
          if end is None:
              raise SystemExit(f"location /hermes/ block is not closed in {path}")

          block = text[start:end + 1]
          block = re.sub(r'\n\s*add_header Set-Cookie "hermes_remember=[^"]+";\n', '\n', block)
          block = re.sub(r'auth_basic\s+[^;]+;', 'auth_basic off;', block)
          block = re.sub(r'\n\s*auth_basic_user_file\s+[^;]+;', '', block)
          text = text[:start] + block + text[end + 1:]
          path.write_text(text, encoding="utf-8")
          PY
          done

          sudo nginx -t
          sudo systemctl reload nginx
          echo "Hermes Basic Auth disabled."
          REMOTE
