name: Allow Hermes Trusted IP on VPS

on:
  workflow_dispatch:
    inputs:
      trusted_ip:
        description: "IPv4 address that can open /hermes/ without Basic Auth"
        required: true
        type: string

jobs:
  allow-hermes-ip:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/deploy_key
          ${{ secrets.VPS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 15 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts; then
              break
            fi
            echo "ssh-keyscan failed, retrying in 5s..."
            sleep 5
          done

      - name: Allow IP for Hermes
        shell: bash
        run: |
          TRUSTED_IP='${{ inputs.trusted_ip }}'
          if ! [[ "$TRUSTED_IP" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
            echo "trusted_ip must be an IPv4 address" >&2
            exit 1
          fi

          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "TRUSTED_IP='$TRUSTED_IP' bash -s" <<'REMOTE'
          set -euo pipefail

          NGINX_FILES="$(sudo grep -rlE 'location /hermes/' /etc/nginx/sites-enabled /etc/nginx/conf.d 2>/dev/null || true)"
          if [ -z "$NGINX_FILES" ]; then
            echo "No nginx file with location /hermes/ found" >&2
            exit 1
          fi

          for NGINX_FILE in $NGINX_FILES; do
            sudo python3 - "$NGINX_FILE" "$TRUSTED_IP" <<'PY'
          import re
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          trusted_ip = sys.argv[2]
          text = path.read_text(encoding="utf-8")

          marker = "location /hermes/ {"
          start = text.find(marker)
          if start == -1:
              raise SystemExit("location /hermes/ not found")

          depth = 0
          end = None
          for index in range(start, len(text)):
              char = text[index]
              if char == "{":
                  depth += 1
              elif char == "}":
                  depth -= 1
                  if depth == 0:
                      end = index
                      break
          if end is None:
              raise SystemExit("location /hermes/ block is not closed")

          block = text[start:end + 1]
          block = re.sub(r"\n\s*# Hermes trusted IP bypass\n\s*satisfy any;\n\s*allow [0-9./]+;\n\s*deny all;\n", "\n", block)
          insert = f"\n        # Hermes trusted IP bypass\n        satisfy any;\n        allow {trusted_ip}/32;\n        deny all;\n"
          if "auth_basic \"Hermes\";" in block:
              block = block.replace("auth_basic \"Hermes\";", insert + "        auth_basic \"Hermes\";", 1)
          else:
              block = block.replace(marker, marker + insert, 1)

          path.write_text(text[:start] + block + text[end + 1:], encoding="utf-8")
          PY
          done

          sudo nginx -t
          sudo systemctl reload nginx
          echo "Hermes trusted IP allowed: $TRUSTED_IP"
          REMOTE
