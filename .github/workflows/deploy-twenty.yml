name: Deploy Twenty CRM

on:
  workflow_dispatch:

concurrency:
  group: supersus-twenty-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/deploy_key
          ${{ secrets.VPS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 20 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deployment assets
        shell: bash
        run: |
          scp -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            deploy/twenty/docker-compose.yml \
            scripts/deploy-twenty.sh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/"

      - name: Deploy Twenty
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'sudo install -m 755 /tmp/deploy-twenty.sh /usr/local/sbin/deploy-supersus-twenty && sudo /usr/local/sbin/deploy-supersus-twenty /tmp/docker-compose.yml'
