name: Install GitHub MCP on VPS

on:
  workflow_dispatch:

jobs:
  install-github-mcp:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/deploy_key
          ${{ secrets.VPS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 15 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts; then
              break
            fi
            echo "ssh-keyscan failed, retrying in 5s..."
            sleep 5
          done

      - name: Install official GitHub MCP binary
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'bash -s' <<'REMOTE'
          set -euo pipefail

          HERMES_USER=hermes
          HERMES_HOME=/opt/hermes
          INSTALL_DIR="$HERMES_HOME/.local/bin"
          VERSION="1.3.0"

          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64) asset_arch="x86_64" ;;
            aarch64|arm64) asset_arch="arm64" ;;
            i386|i686) asset_arch="i386" ;;
            *) echo "Unsupported architecture: $arch" >&2; exit 1 ;;
          esac

          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT

          url="https://github.com/github/github-mcp-server/releases/download/v${VERSION}/github-mcp-server_Linux_${asset_arch}.tar.gz"
          curl -fsSL "$url" -o "$tmp/github-mcp-server.tar.gz"
          tar -xzf "$tmp/github-mcp-server.tar.gz" -C "$tmp"

          sudo install -d -m 755 -o "$HERMES_USER" -g "$HERMES_USER" "$INSTALL_DIR"
          binary="$(find "$tmp" -type f -name github-mcp-server -perm -111 | head -n 1)"
          if [ -z "$binary" ]; then
            echo "github-mcp-server binary not found in archive" >&2
            find "$tmp" -maxdepth 3 -type f >&2
            exit 1
          fi

          sudo install -m 755 -o "$HERMES_USER" -g "$HERMES_USER" "$binary" "$INSTALL_DIR/github-mcp-server"
          sudo -u "$HERMES_USER" "$INSTALL_DIR/github-mcp-server" --version
          REMOTE
