name: Show Telegram Bot Name

on:
  workflow_dispatch:

jobs:
  show-telegram-bot-name:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/deploy_key
          ${{ secrets.VPS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 15 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts; then
              break
            fi
            echo "ssh-keyscan failed, retrying in 5s..."
            sleep 5
          done

      - name: Print bot username
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'bash -s' <<'REMOTE'
          set -euo pipefail
          set +x
          source /etc/atlas-telegram-bot.env
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          with urllib.request.urlopen(f"https://api.telegram.org/bot{token}/getMe", timeout=20) as response:
              payload = json.load(response)
          result = payload.get("result") or {}
          username = result.get("username") or ""
          first_name = result.get("first_name") or ""
          print(f"Telegram bot: @{username}" if username else "Telegram bot username is empty")
          print(f"Bot name: {first_name}")
          PY
          REMOTE
