name: Deploy Atlas Analytics

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: atlas-analytics-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate finance access password
        shell: bash
        env:
          ATLAS_FINANCE_PASSWORD: ${{ secrets.ATLAS_FINANCE_PASSWORD }}
        run: |
          if [ "${#ATLAS_FINANCE_PASSWORD}" -lt 12 ]; then
            echo "ATLAS_FINANCE_PASSWORD must be configured and contain at least 12 characters."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify application and marketing monitor
        run: |
          npm ci
          npm run test:marketing-monitor
          npm run test:expenses
          npm run test:telegram-memory
          npm run test:hermes-voice
          npm run build

      - name: Detect server changes
        id: server_changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "content_api=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="${{ github.sha }}^"
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -Eq '^server/'; then
            echo "content_api=true" >> "$GITHUB_OUTPUT"
          else
            echo "content_api=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/deploy_key
          ${{ secrets.VPS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 15 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts; then
              break
            fi
            echo "ssh-keyscan failed, retrying in 5s..."
            sleep 5
          done

      - name: Deploy on VPS
        shell: bash
        timeout-minutes: 3
        run: |
          for attempt in 1 2 3 4 5 6; do
            if timeout 90s ssh -i ~/.ssh/deploy_key \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=25 \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'bash -lc '"'"'
                timeout 240s /opt/atlas-analytics/deploy.sh
                status=$?
                if [ "$status" -eq 124 ]; then
                  echo "deploy.sh timed out after 240s"
                  exit 124
                fi
                exit "$status"
              '"'"''; then
              exit 0
            fi

            status=$?
            if [ "$status" -eq 124 ]; then
              echo "Deploy SSH command timed out after 90s"
              exit 1
            fi
            echo "Deploy SSH attempt $attempt failed with status $status"
            if [ "$attempt" -eq 6 ]; then
              exit "$status"
            fi
            sleep 20
          done

      - name: Deploy content API
        if: steps.server_changes.outputs.content_api == 'true'
        shell: bash
        timeout-minutes: 15
        run: |
          run_with_retry() {
            local label="$1"
            shift
            for attempt in 1 2 3 4 5; do
            if "$@"; then
              return 0
            else
              local status=$?
            fi
              echo "$label attempt $attempt failed with status $status"
              if [ "$attempt" -eq 5 ]; then
                return "$status"
              fi
              sleep 15
            done
          }

          scp_to_vps() {
            run_with_retry "scp $1" scp -i ~/.ssh/deploy_key \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=25 \
              "$1" \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$2"
          }

          scp_to_vps server/content-api.mjs /tmp/atlas-content-api.mjs
          scp_to_vps server/hermes-speech.mjs /tmp/atlas-hermes-speech.mjs
          scp_to_vps server/hermes-transcription.mjs /tmp/atlas-hermes-transcription.mjs
          scp_to_vps server/marketing-dashboard-monitor.mjs /tmp/atlas-marketing-dashboard-monitor.mjs
          scp_to_vps server/telegram-task-store.mjs /tmp/atlas-telegram-task-store.mjs
          scp_to_vps server/telegram-bot.mjs /tmp/atlas-telegram-bot.mjs
          scp_to_vps server/telegram-memory-archive.mjs /tmp/atlas-telegram-memory-archive.mjs
          scp_to_vps server/telegram-memory-sync.mjs /tmp/atlas-telegram-memory-sync.mjs
          scp_to_vps server/hermes-telegram-bridge.py /tmp/hermes-telegram-bridge.py
          scp_to_vps server/prepare-hermes-hindsight-nous.py /tmp/prepare-hermes-hindsight-nous.py
          scp_to_vps server/configure-hermes-hindsight.sh /tmp/configure-hermes-hindsight.sh
          scp_to_vps server/backup-content.sh /tmp/atlas-content-backup.sh

          # Do not wrap a heredoc-backed SSH session in run_with_retry: after the
          # first attempt stdin is exhausted and a later empty SSH call can hide
          # the original remote failure behind a successful exit status.
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=25 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'bash -s' <<'REMOTE'
          set -euo pipefail

          sudo mkdir -p /opt/atlas-content-api /var/lib/atlas-analytics-content/telegram-memory-archive /var/backups/atlas-analytics-content
          sudo mv /tmp/atlas-content-api.mjs /opt/atlas-content-api/content-api.mjs
          sudo mv /tmp/atlas-hermes-speech.mjs /opt/atlas-content-api/hermes-speech.mjs
          sudo mv /tmp/atlas-hermes-transcription.mjs /opt/atlas-content-api/hermes-transcription.mjs
          sudo mv /tmp/atlas-marketing-dashboard-monitor.mjs /opt/atlas-content-api/marketing-dashboard-monitor.mjs
          sudo mv /tmp/atlas-telegram-task-store.mjs /opt/atlas-content-api/telegram-task-store.mjs
          sudo mv /tmp/atlas-telegram-bot.mjs /opt/atlas-content-api/telegram-bot.mjs
          sudo mv /tmp/atlas-telegram-memory-archive.mjs /opt/atlas-content-api/telegram-memory-archive.mjs
          sudo mv /tmp/atlas-telegram-memory-sync.mjs /opt/atlas-content-api/telegram-memory-sync.mjs
          sudo mv /tmp/atlas-content-backup.sh /opt/atlas-content-api/backup-content.sh
          if id hermes >/dev/null 2>&1 && [ -d /opt/hermes ]; then
            sudo install -m 755 -o root -g root /tmp/hermes-telegram-bridge.py /opt/hermes/hermes-telegram-bridge.py
            sudo install -m 750 -o hermes -g hermes /tmp/prepare-hermes-hindsight-nous.py /opt/hermes/prepare-hermes-hindsight-nous.py
            sudo install -m 750 -o hermes -g hermes /tmp/configure-hermes-hindsight.sh /opt/hermes/configure-hermes-hindsight.sh
          fi
          sudo chmod 755 /opt/atlas-content-api/backup-content.sh
          sudo chown -R root:root /opt/atlas-content-api
          sudo chown -R www-data:www-data /var/lib/atlas-analytics-content
          sudo chown -R root:root /var/backups/atlas-analytics-content
          sudo chmod 750 /var/backups/atlas-analytics-content

          PIPER_DIR=/opt/atlas-hermes-tts
          PIPER_VENV="$PIPER_DIR/venv"
          PIPER_VOICES="$PIPER_DIR/voices"
          sudo mkdir -p "$PIPER_VOICES"
          if [ ! -x "$PIPER_VENV/bin/python" ]; then
            if ! sudo python3 -m venv "$PIPER_VENV"; then
              sudo apt-get update
              sudo apt-get install -y python3-venv
              sudo python3 -m venv "$PIPER_VENV"
            fi
          fi
          sudo "$PIPER_VENV/bin/pip" install --disable-pip-version-check --quiet 'piper-tts[http]==1.5.0' 'edge-tts==7.2.8'
          if [ ! -f "$PIPER_VOICES/ru_RU-dmitri-medium.onnx" ] || [ ! -f "$PIPER_VOICES/ru_RU-dmitri-medium.onnx.json" ]; then
            sudo "$PIPER_VENV/bin/python" -m piper.download_voices \
              --download-dir "$PIPER_VOICES" \
              ru_RU-dmitri-medium
          fi
          sudo chown -R root:root "$PIPER_DIR"
          sudo chmod -R a+rX "$PIPER_DIR"

          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi
          timeout 45s sudo systemctl enable --now docker.service
          sudo mkdir -p /opt/atlas-hermes-stt/cache
          sudo docker pull onerahmet/openai-whisper-asr-webservice:latest
          sudo docker rm -f atlas-hermes-stt >/dev/null 2>&1 || true
          sudo docker run -d \
            --name atlas-hermes-stt \
            --restart unless-stopped \
            --memory 2g \
            --cpus 1 \
            -p 127.0.0.1:7467:9000 \
            -e ASR_ENGINE=faster_whisper \
            -e ASR_MODEL=base \
            -e ASR_DEVICE=cpu \
            -e MODEL_IDLE_TIMEOUT=600 \
            -v /opt/atlas-hermes-stt/cache:/root/.cache \
            onerahmet/openai-whisper-asr-webservice:latest
          sudo tee /etc/atlas-outreach.env >/dev/null <<'ENV'
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          OUTREACH_FROM_EMAIL=${{ secrets.OUTREACH_FROM_EMAIL }}
          OUTREACH_REPLY_TO_EMAIL=${{ secrets.OUTREACH_REPLY_TO_EMAIL }}
          TGSTAT_TOKEN=${{ secrets.TGSTAT_TOKEN }}
          TELEMETR_API_KEY=${{ secrets.TELEMETR_API_KEY }}
          TELEGRAM_PUSH_CHAT_ID=-5158247269
          ATLAS_YOUTRACK_URL=${{ secrets.ATLAS_YOUTRACK_URL }}
          ATLAS_YOUTRACK_LOGIN=${{ secrets.ATLAS_YOUTRACK_LOGIN }}
          ATLAS_YOUTRACK_PASSWORD=${{ secrets.ATLAS_YOUTRACK_PASSWORD }}
          ATLAS_YOUTRACK_TOKEN=${{ secrets.ATLAS_YOUTRACK_TOKEN }}
          ATLAS_YOUTRACK_PROJECT=${{ secrets.ATLAS_YOUTRACK_PROJECT }}
          ATLAS_FINANCE_PASSWORD=${{ secrets.ATLAS_FINANCE_PASSWORD }}
          ENV
          INTERNAL_MONITOR_TOKEN="$(openssl rand -hex 32)"
          echo "ATLAS_INTERNAL_MONITOR_TOKEN=$INTERNAL_MONITOR_TOKEN" | sudo tee -a /etc/atlas-outreach.env >/dev/null
          sudo chown root:root /etc/atlas-outreach.env
          sudo chmod 600 /etc/atlas-outreach.env

          sudo tee /etc/systemd/system/atlas-content-api.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Atlas Analytics Content API
          After=network.target

          [Service]
          Type=simple
          EnvironmentFile=-/etc/atlas-outreach.env
          Environment=ATLAS_CONTENT_API_PORT=8787
          Environment=ATLAS_CONTENT_STORE_DIR=/var/lib/atlas-analytics-content
          Environment=PIPER_TTS_URL=http://127.0.0.1:7466/synthesize
          Environment=EDGE_TTS_BIN=/opt/atlas-hermes-tts/venv/bin/edge-tts
          Environment=EDGE_TTS_VOICE=en-US-AndrewMultilingualNeural
          Environment=WHISPER_ASR_URL=http://127.0.0.1:7467/asr
          ExecStart=/usr/bin/node /opt/atlas-content-api/content-api.mjs
          Restart=always
          RestartSec=3
          User=www-data
          Group=www-data

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo tee /etc/systemd/system/atlas-hermes-tts.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Atlas Hermes local Russian text-to-speech
          After=network.target

          [Service]
          Type=simple
          ExecStart=/opt/atlas-hermes-tts/venv/bin/python -m piper.http_server --host 127.0.0.1 --port 7466 --model ru_RU-dmitri-medium --data-dir /opt/atlas-hermes-tts/voices --length-scale 1.12 --sentence-silence 0.25
          Restart=always
          RestartSec=3
          User=www-data
          Group=www-data
          NoNewPrivileges=true
          PrivateTmp=true

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo tee /etc/systemd/system/atlas-content-backup.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Backup Atlas Analytics CRM content
          After=atlas-content-api.service

          [Service]
          Type=oneshot
          Environment=ATLAS_CONTENT_STORE_DIR=/var/lib/atlas-analytics-content
          Environment=ATLAS_CONTENT_BACKUP_DIR=/var/backups/atlas-analytics-content
          Environment=ATLAS_CONTENT_BACKUP_RETENTION_DAYS=30
          ExecStart=/opt/atlas-content-api/backup-content.sh
          User=root
          Group=root
          SERVICE

          sudo tee /etc/systemd/system/atlas-content-backup.timer >/dev/null <<'TIMER'
          [Unit]
          Description=Daily Atlas Analytics CRM content backup

          [Timer]
          OnCalendar=*-*-* 03:20:00
          Persistent=true
          RandomizedDelaySec=10m
          Unit=atlas-content-backup.service

          [Install]
          WantedBy=timers.target
          TIMER

          sudo tee /etc/systemd/system/atlas-youtrack-monitor.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Check Atlas YouTrack task changes and push notifications
          After=atlas-content-api.service

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c '/usr/bin/curl --max-time 45 -fsS -X POST http://127.0.0.1:8787/api/youtrack/check -H "Content-Type: application/json" -d "{\"notify\":true}"'
          User=www-data
          Group=www-data
          SERVICE

          sudo tee /etc/systemd/system/atlas-youtrack-monitor.timer >/dev/null <<'TIMER'
          [Unit]
          Description=Run Atlas YouTrack task monitor every minute

          [Timer]
          OnBootSec=2m
          OnUnitActiveSec=1m
          Persistent=true
          Unit=atlas-youtrack-monitor.service

          [Install]
          WantedBy=timers.target
          TIMER

          sudo tee /etc/systemd/system/atlas-youtrack-digest.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Send Atlas YouTrack daily task digest to Telegram
          After=atlas-content-api.service

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c '/usr/bin/curl --max-time 45 -fsS -X POST http://127.0.0.1:8787/api/youtrack/digest -H "Content-Type: application/json" -d "{\"notify\":true}"'
          User=www-data
          Group=www-data
          SERVICE

          sudo tee /etc/systemd/system/atlas-youtrack-digest.timer >/dev/null <<'TIMER'
          [Unit]
          Description=Send Atlas YouTrack task digest daily at 15:00 Moscow time

          [Timer]
          OnCalendar=*-*-* 12:00:00 UTC
          Persistent=true
          Unit=atlas-youtrack-digest.service

          [Install]
          WantedBy=timers.target
          TIMER

          sudo tee /etc/systemd/system/atlas-marketing-youtube-monitor.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Send Atlas marketing YouTube parser daily report to Telegram
          After=atlas-content-api.service

          [Service]
          Type=oneshot
          EnvironmentFile=-/etc/atlas-outreach.env
          ExecStart=/bin/sh -c '/usr/bin/curl --max-time 45 -sS --fail-with-body -X POST http://127.0.0.1:8787/internal/marketing/youtube-monitor -H "X-Atlas-Internal-Token: $ATLAS_INTERNAL_MONITOR_TOKEN"'
          User=www-data
          Group=www-data
          SERVICE

          sudo tee /etc/systemd/system/atlas-marketing-youtube-monitor.timer >/dev/null <<'TIMER'
          [Unit]
          Description=Send Atlas marketing YouTube parser report daily at 15:10 Moscow time

          [Timer]
          OnCalendar=*-*-* 12:10:00 UTC
          Persistent=true
          Unit=atlas-marketing-youtube-monitor.service

          [Install]
          WantedBy=timers.target
          TIMER

          sudo tee /etc/systemd/system/atlas-marketing-dashboard-monitor.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Send meaningful Marketing Dashboard changes to Telegram
          After=atlas-content-api.service
          Requires=atlas-content-api.service

          [Service]
          Type=oneshot
          EnvironmentFile=-/etc/atlas-outreach.env
          ExecStart=/bin/sh -c '/usr/bin/curl --max-time 45 -sS --fail-with-body -X POST http://127.0.0.1:8787/internal/marketing/dashboard-monitor -H "X-Atlas-Internal-Token: $ATLAS_INTERNAL_MONITOR_TOKEN"'
          User=www-data
          Group=www-data
          SERVICE

          sudo tee /etc/systemd/system/atlas-marketing-dashboard-monitor.timer >/dev/null <<'TIMER'
          [Unit]
          Description=Check Marketing Dashboard changes every 10 minutes

          [Timer]
          OnBootSec=2min
          OnUnitActiveSec=10min
          Persistent=true
          Unit=atlas-marketing-dashboard-monitor.service

          [Install]
          WantedBy=timers.target
          TIMER

          sudo tee /etc/systemd/system/atlas-telegram-bot.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Atlas Telegram Tasks Bot
          After=network.target atlas-content-api.service

          [Service]
          Type=simple
          EnvironmentFile=-/etc/atlas-telegram-bot.env
          Environment=ATLAS_CONTENT_STORE_DIR=/var/lib/atlas-analytics-content
          Environment=TELEGRAM_MEMORY_ARCHIVE_DIR=/var/lib/atlas-analytics-content/telegram-memory-archive
          ExecStart=/usr/bin/node /opt/atlas-content-api/telegram-bot.mjs
          Restart=always
          RestartSec=5
          User=www-data
          Group=www-data

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo tee /etc/systemd/system/atlas-telegram-memory-sync.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Sync the durable Atlas Telegram archive into Hermes long-term memory
          Requires=atlas-hermes-hindsight-nous.service
          After=network.target atlas-hermes-hindsight-nous.service hermes-telegram-bridge.service atlas-telegram-bot.service

          [Service]
          Type=oneshot
          EnvironmentFile=-/etc/atlas-telegram-bot.env
          Environment=TELEGRAM_MEMORY_ARCHIVE_DIR=/var/lib/atlas-analytics-content/telegram-memory-archive
          ExecCondition=/bin/sh -c 'case "$HERMES_LONG_TERM_MEMORY_READY" in 1|true|yes|on) exit 0;; *) exit 1;; esac'
          ExecStart=/usr/bin/node /opt/atlas-content-api/telegram-memory-sync.mjs
          User=www-data
          Group=www-data
          SERVICE

          sudo tee /etc/systemd/system/atlas-hermes-hindsight-nous.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Refresh Nous inference credentials for Atlas Hindsight memory
          After=network.target

          [Service]
          Type=oneshot
          EnvironmentFile=-/etc/atlas-telegram-bot.env
          Environment=HOME=/opt/hermes
          Environment=HERMES_HOME=/opt/hermes
          Environment=HINDSIGHT_NOUS_MODEL=~openai/gpt-mini-latest
          ExecCondition=/bin/sh -c 'case "$HERMES_LONG_TERM_MEMORY_READY" in 1|true|yes|on) exit 0;; *) exit 1;; esac'
          ExecStart=/opt/hermes/.hermes/hermes-agent/venv/bin/python /opt/hermes/prepare-hermes-hindsight-nous.py
          User=hermes
          Group=hermes
          SERVICE

          sudo tee /etc/systemd/system/atlas-telegram-memory-sync.timer >/dev/null <<'TIMER'
          [Unit]
          Description=Sync Atlas Telegram memory twice daily

          [Timer]
          OnCalendar=*-*-* 05,17:00:00 UTC
          Persistent=true
          RandomizedDelaySec=5m
          Unit=atlas-telegram-memory-sync.service

          [Install]
          WantedBy=timers.target
          TIMER

          timeout 45s sudo systemctl daemon-reload
          timeout 45s sudo systemctl enable --now atlas-hermes-tts.service
          timeout 45s sudo systemctl restart atlas-hermes-tts.service
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:7466/info >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              sudo systemctl status atlas-hermes-tts.service --no-pager || true
              sudo journalctl -u atlas-hermes-tts.service -n 60 --no-pager || true
              exit 1
            fi
            sleep 2
          done
          for attempt in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:7467/docs >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 45 ]; then
              sudo docker logs --tail 80 atlas-hermes-stt || true
              exit 1
            fi
            sleep 2
          done
          curl -fsS \
            -H 'Content-Type: application/json' \
            -d '{"text":"Гермес проверяет распознавание голоса","length_scale":1.12}' \
            http://127.0.0.1:7466/synthesize \
            -o /tmp/atlas-hermes-stt-check.wav
          STT_CHECK="$(curl -fsS --max-time 180 \
            -F 'audio_file=@/tmp/atlas-hermes-stt-check.wav;type=audio/wav' \
            'http://127.0.0.1:7467/asr?task=transcribe&language=ru&output=json&encode=true&vad_filter=true')"
          rm -f /tmp/atlas-hermes-stt-check.wav
          if ! printf '%s' "$STT_CHECK" | python3 -c \
            'import json, sys; assert str(json.load(sys.stdin).get("text", "")).strip()'; then
            echo "Whisper returned no transcription: $STT_CHECK"
            sudo docker logs --tail 80 atlas-hermes-stt || true
            exit 1
          fi
          timeout 45s sudo systemctl enable --now atlas-content-api.service
          timeout 45s sudo systemctl restart atlas-content-api.service
          timeout 45s sudo systemctl enable --now atlas-telegram-bot.service
          timeout 45s sudo systemctl restart atlas-telegram-bot.service
          if systemctl list-unit-files | grep -q '^hermes-telegram-bridge.service'; then
            timeout 45s sudo systemctl restart hermes-telegram-bridge.service
          fi
          timeout 45s sudo systemctl enable --now atlas-telegram-memory-sync.timer
          timeout 45s sudo systemctl enable --now atlas-content-backup.timer
          timeout 90s sudo systemctl start atlas-content-backup.service || true
          timeout 45s sudo systemctl enable --now atlas-youtrack-monitor.timer
          timeout 70s sudo systemctl start atlas-youtrack-monitor.service || true
          timeout 45s sudo systemctl enable --now atlas-youtrack-digest.timer
          timeout 45s sudo systemctl enable --now atlas-marketing-youtube-monitor.timer
          timeout 45s sudo systemctl enable --now atlas-marketing-dashboard-monitor.timer
          if ! timeout 70s sudo systemctl start atlas-marketing-dashboard-monitor.service; then
            sudo systemctl status atlas-marketing-dashboard-monitor.service --no-pager || true
            sudo journalctl -u atlas-marketing-dashboard-monitor.service -n 40 --no-pager || true
            sudo journalctl -u atlas-content-api.service -n 40 --no-pager || true
            exit 1
          fi
          REMOTE

      - name: Configure content API routes
        if: steps.server_changes.outputs.content_api == 'true'
        shell: bash
        timeout-minutes: 4
        run: |
          run_with_retry() {
            local label="$1"
            shift
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              else
                local status=$?
              fi
              echo "$label attempt $attempt failed with status $status"
              if [ "$attempt" -eq 5 ]; then
                return "$status"
              fi
              sleep 15
            done
          }

          run_with_retry "nginx routes ssh" ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=25 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'bash -s' <<'REMOTE'
          set -euo pipefail

          NGINX_FILES="$(sudo grep -rlE 'supersussystem.com|analytics.pupanel.cc|location /api/content/' /etc/nginx/sites-enabled /etc/nginx/conf.d 2>/dev/null || true)"
          if [ -z "$NGINX_FILES" ]; then
            NGINX_FILES="$(sudo find /etc/nginx/sites-enabled /etc/nginx/conf.d -type f 2>/dev/null | head -n 1 || true)"
          fi

          for NGINX_FILE in $NGINX_FILES; do
            if [ -n "$NGINX_FILE" ] && ! sudo grep -q 'location /api/content/' "$NGINX_FILE"; then
              sudo python3 - "$NGINX_FILE" <<'PY'
          import sys
          path = sys.argv[1]
