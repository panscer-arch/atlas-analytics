name: Deploy Atlas Analytics

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: atlas-analytics-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate finance access password
        shell: bash
        env:
          ATLAS_FINANCE_PASSWORD: ${{ secrets.ATLAS_FINANCE_PASSWORD }}
        run: |
          if [ "${#ATLAS_FINANCE_PASSWORD}" -lt 12 ]; then
            echo "ATLAS_FINANCE_PASSWORD must be configured and contain at least 12 characters."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify application and marketing monitor
        run: |
          npm ci
          npm run test:marketing-monitor
          npm run test:expenses
          npm run build

      - name: Detect server changes
        id: server_changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "content_api=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="${{ github.sha }}^"
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -Eq '^server/'; then
            echo "content_api=true" >> "$GITHUB_OUTPUT"
          else
            echo "content_api=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/deploy_key
          ${{ secrets.VPS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key
          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 15 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts; then
              break
            fi
            echo "ssh-keyscan failed, retrying in 5s..."
            sleep 5
          done

      - name: Deploy on VPS
        shell: bash
        timeout-minutes: 3
        run: |
          for attempt in 1 2 3 4 5 6; do
            if timeout 90s ssh -i ~/.ssh/deploy_key \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=25 \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'bash -lc '"'"'
                timeout 240s /opt/atlas-analytics/deploy.sh
                status=$?
                if [ "$status" -eq 124 ]; then
                  echo "deploy.sh timed out after 240s"
                  exit 124
                fi
                exit "$status"
              '"'"''; then
              exit 0
            fi

            status=$?
            if [ "$status" -eq 124 ]; then
              echo "Deploy SSH command timed out after 90s"
              exit 1
            fi
            echo "Deploy SSH attempt $attempt failed with status $status"
            if [ "$attempt" -eq 6 ]; then
              exit "$status"
            fi
            sleep 20
          done

      - name: Deploy content API
        if: steps.server_changes.outputs.content_api == 'true'
        shell: bash
        timeout-minutes: 6
        run: |
          run_with_retry() {
            local label="$1"
            shift
            for attempt in 1 2 3 4 5; do
            if "$@"; then
              return 0
            else
              local status=$?
            fi
              echo "$label attempt $attempt failed with status $status"
              if [ "$attempt" -eq 5 ]; then
                return "$status"
              fi
              sleep 15
            done
          }

          scp_to_vps() {
            run_with_retry "scp $1" scp -i ~/.ssh/deploy_key \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=25 \
              "$1" \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$2"
          }

          scp_to_vps server/content-api.mjs /tmp/atlas-content-api.mjs
          scp_to_vps server/marketing-dashboard-monitor.mjs /tmp/atlas-marketing-dashboard-monitor.mjs
          scp_to_vps server/telegram-task-store.mjs /tmp/atlas-telegram-task-store.mjs
          scp_to_vps server/telegram-bot.mjs /tmp/atlas-telegram-bot.mjs
          scp_to_vps server/backup-content.sh /tmp/atlas-content-backup.sh
          scp_to_vps server/configure-nginx-finance.py /tmp/atlas-configure-nginx-finance.py

          run_with_retry "content-api ssh" ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=25 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'bash -s' <<'REMOTE'
          set -euo pipefail

          sudo mkdir -p /opt/atlas-content-api /var/lib/atlas-analytics-content /var/backups/atlas-analytics-content
          sudo mv /tmp/atlas-content-api.mjs /opt/atlas-content-api/content-api.mjs
          sudo mv /tmp/atlas-marketing-dashboard-monitor.mjs /opt/atlas-content-api/marketing-dashboard-monitor.mjs
          sudo mv /tmp/atlas-telegram-task-store.mjs /opt/atlas-content-api/telegram-task-store.mjs
          sudo mv /tmp/atlas-telegram-bot.mjs /opt/atlas-content-api/telegram-bot.mjs
          sudo mv /tmp/atlas-content-backup.sh /opt/atlas-content-api/backup-content.sh
          sudo chmod 755 /opt/atlas-content-api/backup-content.sh
          sudo chown -R root:root /opt/atlas-content-api
          sudo chown -R www-data:www-data /var/lib/atlas-analytics-content
          sudo chown -R root:root /var/backups/atlas-analytics-content
          sudo chmod 750 /var/backups/atlas-analytics-content
          sudo tee /etc/atlas-outreach.env >/dev/null <<'ENV'
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          OUTREACH_FROM_EMAIL=${{ secrets.OUTREACH_FROM_EMAIL }}
          OUTREACH_REPLY_TO_EMAIL=${{ secrets.OUTREACH_REPLY_TO_EMAIL }}
          TGSTAT_TOKEN=${{ secrets.TGSTAT_TOKEN }}
          TELEMETR_API_KEY=${{ secrets.TELEMETR_API_KEY }}
          TELEGRAM_PUSH_CHAT_ID=-5158247269
          ATLAS_YOUTRACK_URL=${{ secrets.ATLAS_YOUTRACK_URL }}
          ATLAS_YOUTRACK_LOGIN=${{ secrets.ATLAS_YOUTRACK_LOGIN }}
          ATLAS_YOUTRACK_PASSWORD=${{ secrets.ATLAS_YOUTRACK_PASSWORD }}
          ATLAS_YOUTRACK_TOKEN=${{ secrets.ATLAS_YOUTRACK_TOKEN }}
          ATLAS_YOUTRACK_PROJECT=${{ secrets.ATLAS_YOUTRACK_PROJECT }}
          ATLAS_FINANCE_PASSWORD=${{ secrets.ATLAS_FINANCE_PASSWORD }}
          ENV
          INTERNAL_MONITOR_TOKEN="$(openssl rand -hex 32)"
          echo "ATLAS_INTERNAL_MONITOR_TOKEN=$INTERNAL_MONITOR_TOKEN" | sudo tee -a /etc/atlas-outreach.env >/dev/null
          sudo chown root:root /etc/atlas-outreach.env
          sudo chmod 600 /etc/atlas-outreach.env

          sudo tee /etc/systemd/system/atlas-content-api.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Atlas Analytics Content API
          After=network.target

          [Service]
          Type=simple
          EnvironmentFile=-/etc/atlas-outreach.env
          Environment=ATLAS_CONTENT_API_PORT=8787
          Environment=ATLAS_CONTENT_STORE_DIR=/var/lib/atlas-analytics-content
          ExecStart=/usr/bin/node /opt/atlas-content-api/content-api.mjs
          Restart=always
          RestartSec=3
          User=www-data
          Group=www-data

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo tee /etc/systemd/system/atlas-content-backup.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Backup Atlas Analytics CRM content
          After=atlas-content-api.service

          [Service]
          Type=oneshot
          Environment=ATLAS_CONTENT_STORE_DIR=/var/lib/atlas-analytics-content
          Environment=ATLAS_CONTENT_BACKUP_DIR=/var/backups/atlas-analytics-content
          Environment=ATLAS_CONTENT_BACKUP_RETENTION_DAYS=30
          ExecStart=/opt/atlas-content-api/backup-content.sh
          User=root
          Group=root
          SERVICE

          sudo tee /etc/systemd/system/atlas-content-backup.timer >/dev/null <<'TIMER'
          [Unit]
          Description=Daily Atlas Analytics CRM content backup

          [Timer]
          OnCalendar=*-*-* 03:20:00
          Persistent=true
          RandomizedDelaySec=10m
          Unit=atlas-content-backup.service

          [Install]
          WantedBy=timers.target
          TIMER

          sudo tee /etc/systemd/system/atlas-youtrack-monitor.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Check Atlas YouTrack task changes and push notifications
          After=atlas-content-api.service

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c '/usr/bin/curl --max-time 45 -fsS -X POST http://127.0.0.1:8787/api/youtrack/check -H "Content-Type: application/json" -d "{\"notify\":true}"'
          User=www-data
          Group=www-data
          SERVICE

          sudo tee /etc/systemd/system/atlas-youtrack-monitor.timer >/dev/null <<'TIMER'
          [Unit]
          Description=Run Atlas YouTrack task monitor every minute

          [Timer]
          OnBootSec=2m
          OnUnitActiveSec=1m
          Persistent=true
          Unit=atlas-youtrack-monitor.service

          [Install]
          WantedBy=timers.target
          TIMER

          sudo tee /etc/systemd/system/atlas-youtrack-digest.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Send Atlas YouTrack daily task digest to Telegram
          After=atlas-content-api.service

          [Service]
          Type=oneshot
          ExecStart=/bin/sh -c '/usr/bin/curl --max-time 45 -fsS -X POST http://127.0.0.1:8787/api/youtrack/digest -H "Content-Type: application/json" -d "{\"notify\":true}"'
          User=www-data
          Group=www-data
          SERVICE

          sudo tee /etc/systemd/system/atlas-youtrack-digest.timer >/dev/null <<'TIMER'
          [Unit]
          Description=Send Atlas YouTrack task digest daily at 15:00 Moscow time

          [Timer]
          OnCalendar=*-*-* 12:00:00 UTC
          Persistent=true
          Unit=atlas-youtrack-digest.service

          [Install]
          WantedBy=timers.target
          TIMER

          sudo tee /etc/systemd/system/atlas-marketing-youtube-monitor.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Send Atlas marketing YouTube parser daily report to Telegram
          After=atlas-content-api.service

          [Service]
          Type=oneshot
          EnvironmentFile=-/etc/atlas-outreach.env
          ExecStart=/bin/sh -c '/usr/bin/curl --max-time 45 -sS --fail-with-body -X POST http://127.0.0.1:8787/internal/marketing/youtube-monitor -H "X-Atlas-Internal-Token: $ATLAS_INTERNAL_MONITOR_TOKEN"'
          User=www-data
          Group=www-data
          SERVICE

          sudo tee /etc/systemd/system/atlas-marketing-youtube-monitor.timer >/dev/null <<'TIMER'
          [Unit]
          Description=Send Atlas marketing YouTube parser report daily at 15:10 Moscow time

          [Timer]
          OnCalendar=*-*-* 12:10:00 UTC
          Persistent=true
          Unit=atlas-marketing-youtube-monitor.service

          [Install]
          WantedBy=timers.target
          TIMER

          sudo tee /etc/systemd/system/atlas-marketing-dashboard-monitor.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Send meaningful Marketing Dashboard changes to Telegram
          After=atlas-content-api.service
          Requires=atlas-content-api.service

          [Service]
          Type=oneshot
          EnvironmentFile=-/etc/atlas-outreach.env
          ExecStart=/bin/sh -c '/usr/bin/curl --max-time 45 -sS --fail-with-body -X POST http://127.0.0.1:8787/internal/marketing/dashboard-monitor -H "X-Atlas-Internal-Token: $ATLAS_INTERNAL_MONITOR_TOKEN"'
          User=www-data
          Group=www-data
          SERVICE

          sudo tee /etc/systemd/system/atlas-marketing-dashboard-monitor.timer >/dev/null <<'TIMER'
          [Unit]
          Description=Check Marketing Dashboard changes every 10 minutes

          [Timer]
          OnBootSec=2min
          OnUnitActiveSec=10min
          Persistent=true
          Unit=atlas-marketing-dashboard-monitor.service

          [Install]
          WantedBy=timers.target
          TIMER

          sudo tee /etc/systemd/system/atlas-telegram-bot.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Atlas Telegram Tasks Bot
          After=network.target atlas-content-api.service

          [Service]
          Type=simple
          EnvironmentFile=-/etc/atlas-telegram-bot.env
          Environment=ATLAS_CONTENT_STORE_DIR=/var/lib/atlas-analytics-content
          ExecStart=/usr/bin/node /opt/atlas-content-api/telegram-bot.mjs
          Restart=always
          RestartSec=5
          User=www-data
          Group=www-data

          [Install]
          WantedBy=multi-user.target
          SERVICE

          timeout 45s sudo systemctl daemon-reload
          timeout 45s sudo systemctl enable --now atlas-content-api.service
          timeout 45s sudo systemctl restart atlas-content-api.service
          timeout 45s sudo systemctl enable --now atlas-telegram-bot.service
          timeout 45s sudo systemctl restart atlas-telegram-bot.service
          timeout 45s sudo systemctl enable --now atlas-content-backup.timer
          timeout 90s sudo systemctl start atlas-content-backup.service || true
          timeout 45s sudo systemctl enable --now atlas-youtrack-monitor.timer
          timeout 70s sudo systemctl start atlas-youtrack-monitor.service || true
          timeout 45s sudo systemctl enable --now atlas-youtrack-digest.timer
          timeout 45s sudo systemctl enable --now atlas-marketing-youtube-monitor.timer
          timeout 45s sudo systemctl enable --now atlas-marketing-dashboard-monitor.timer
          if ! timeout 70s sudo systemctl start atlas-marketing-dashboard-monitor.service; then
            sudo systemctl status atlas-marketing-dashboard-monitor.service --no-pager || true
            sudo journalctl -u atlas-marketing-dashboard-monitor.service -n 40 --no-pager || true
            sudo journalctl -u atlas-content-api.service -n 40 --no-pager || true
            exit 1
          fi

          NGINX_FILES="$(sudo grep -rlE 'supersussystem.com|analytics.pupanel.cc|location /api/content/' /etc/nginx/sites-enabled /etc/nginx/conf.d 2>/dev/null || true)"
          if [ -z "$NGINX_FILES" ]; then
            NGINX_FILES="$(sudo find /etc/nginx/sites-enabled /etc/nginx/conf.d -type f 2>/dev/null | head -n 1 || true)"
          fi

          for NGINX_FILE in $NGINX_FILES; do
            if [ -n "$NGINX_FILE" ] && ! sudo grep -q 'location /api/content/' "$NGINX_FILE"; then
              sudo python3 - "$NGINX_FILE" <<'PY'
          import sys
          path = sys.argv[1]
          text = open(path, encoding="utf-8").read()
          snippet = """

              location /api/content/ {
                  proxy_pass http://127.0.0.1:8787/api/content/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  client_max_body_size 10m;
              }
          """
          marker = "location /api/content/"
          if marker not in text:
              index = text.find("location /")
              if index != -1:
                  line_start = text.rfind("\n", 0, index) + 1
                  text = text[:line_start] + snippet + "\n" + text[line_start:]
              else:
                  index = text.rfind("}")
                  text = text[:index] + snippet + "\n" + text[index:]
              open(path, "w", encoding="utf-8").write(text)
          PY
            fi

            if [ -n "$NGINX_FILE" ] && ! sudo grep -q 'location /api/telegram/' "$NGINX_FILE"; then
              sudo python3 - "$NGINX_FILE" <<'PY'
          import sys
          path = sys.argv[1]
          text = open(path, encoding="utf-8").read()
          snippet = """

              location /api/telegram/ {
                  proxy_pass http://127.0.0.1:8787/api/telegram/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  client_max_body_size 10m;
              }
          """
          if "location /api/telegram/" not in text:
              index = text.find("location /api/content/")
              if index != -1:
                  line_start = text.rfind("\n", 0, index) + 1
                  text = text[:line_start] + snippet + "\n" + text[line_start:]
              else:
                  index = text.find("location /")
                  if index != -1:
                      line_start = text.rfind("\n", 0, index) + 1
                      text = text[:line_start] + snippet + "\n" + text[line_start:]
                  else:
                      index = text.rfind("}")
                      text = text[:index] + snippet + "\n" + text[index:]
              open(path, "w", encoding="utf-8").write(text)
          PY
            fi

            if [ -n "$NGINX_FILE" ] && ! sudo grep -q 'location /api/outreach/' "$NGINX_FILE"; then
              sudo python3 - "$NGINX_FILE" <<'PY'
          import sys
          path = sys.argv[1]
          text = open(path, encoding="utf-8").read()
          snippet = """

              location /api/outreach/ {
                  proxy_pass http://127.0.0.1:8787/api/outreach/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  client_max_body_size 10m;
              }
          """
          if "location /api/outreach/" not in text:
              index = text.find("location /api/telegram/")
              if index != -1:
                  line_start = text.rfind("\n", 0, index) + 1
                  text = text[:line_start] + snippet + "\n" + text[line_start:]
              else:
                  index = text.find("location /api/content/")
                  if index != -1:
                      line_start = text.rfind("\n", 0, index) + 1
                      text = text[:line_start] + snippet + "\n" + text[line_start:]
                  else:
                      index = text.find("location /")
                      if index != -1:
                          line_start = text.rfind("\n", 0, index) + 1
                          text = text[:line_start] + snippet + "\n" + text[line_start:]
                      else:
                          index = text.rfind("}")
                          text = text[:index] + snippet + "\n" + text[index:]
              open(path, "w", encoding="utf-8").write(text)
          PY
            fi

            if [ -n "$NGINX_FILE" ] && ! sudo grep -q 'location /api/youtrack/' "$NGINX_FILE"; then
              sudo python3 - "$NGINX_FILE" <<'PY'
          import sys
          path = sys.argv[1]
          text = open(path, encoding="utf-8").read()
          snippet = """

              location /api/youtrack/ {
                  proxy_pass http://127.0.0.1:8787/api/youtrack/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  client_max_body_size 10m;
              }
          """
          if "location /api/youtrack/" not in text:
              index = text.find("location /api/pools/")
              if index != -1:
                  line_start = text.rfind("\n", 0, index) + 1
                  text = text[:line_start] + snippet + "\n" + text[line_start:]
              else:
                  index = text.find("location /api/outreach/")
                  if index != -1:
                      line_start = text.rfind("\n", 0, index) + 1
                      text = text[:line_start] + snippet + "\n" + text[line_start:]
                  else:
                      index = text.find("location /api/telegram/")
                      if index != -1:
                          line_start = text.rfind("\n", 0, index) + 1
                          text = text[:line_start] + snippet + "\n" + text[line_start:]
                      else:
                          index = text.find("location /api/content/")
                          if index != -1:
                              line_start = text.rfind("\n", 0, index) + 1
                              text = text[:line_start] + snippet + "\n" + text[line_start:]
                          else:
                              index = text.find("location /")
                              if index != -1:
                                  line_start = text.rfind("\n", 0, index) + 1
                                  text = text[:line_start] + snippet + "\n" + text[line_start:]
                              else:
                                  index = text.rfind("}")
                                  text = text[:index] + snippet + "\n" + text[index:]
              open(path, "w", encoding="utf-8").write(text)
          PY
            fi

            if [ -n "$NGINX_FILE" ] && ! sudo grep -q 'location /api/pools/' "$NGINX_FILE"; then
              sudo python3 - "$NGINX_FILE" <<'PY'
          import sys
          path = sys.argv[1]
          text = open(path, encoding="utf-8").read()
          snippet = """

              location /api/pools/ {
                  proxy_pass http://127.0.0.1:8787/api/pools/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  client_max_body_size 10m;
              }
          """
          if "location /api/pools/" not in text:
              index = text.find("location /api/outreach/")
              if index != -1:
                  line_start = text.rfind("\n", 0, index) + 1
                  text = text[:line_start] + snippet + "\n" + text[line_start:]
              else:
                  index = text.find("location /api/telegram/")
                  if index != -1:
                      line_start = text.rfind("\n", 0, index) + 1
                      text = text[:line_start] + snippet + "\n" + text[line_start:]
                  else:
                      index = text.find("location /api/content/")
                      if index != -1:
                          line_start = text.rfind("\n", 0, index) + 1
                          text = text[:line_start] + snippet + "\n" + text[line_start:]
                      else:
                          index = text.find("location /")
                          if index != -1:
                              line_start = text.rfind("\n", 0, index) + 1
                              text = text[:line_start] + snippet + "\n" + text[line_start:]
                          else:
                              index = text.rfind("}")
                              text = text[:index] + snippet + "\n" + text[index:]
              open(path, "w", encoding="utf-8").write(text)
          PY
            fi

            if [ -n "$NGINX_FILE" ] && ! sudo grep -q 'location /api/contracts/' "$NGINX_FILE"; then
              sudo python3 - "$NGINX_FILE" <<'PY'
          import sys
          path = sys.argv[1]
          text = open(path, encoding="utf-8").read()
          snippet = """

              location /api/contracts/ {
                  proxy_pass http://127.0.0.1:8787/api/contracts/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  client_max_body_size 10m;
              }
          """
          if "location /api/contracts/" not in text:
              index = text.find("location /api/pools/")
              if index != -1:
                  line_start = text.rfind("\n", 0, index) + 1
                  text = text[:line_start] + snippet + "\n" + text[line_start:]
              else:
                  index = text.find("location /api/outreach/")
                  if index != -1:
                      line_start = text.rfind("\n", 0, index) + 1
                      text = text[:line_start] + snippet + "\n" + text[line_start:]
                  else:
                      index = text.find("location /api/telegram/")
                      if index != -1:
                          line_start = text.rfind("\n", 0, index) + 1
                          text = text[:line_start] + snippet + "\n" + text[line_start:]
                      else:
                          index = text.find("location /api/content/")
                          if index != -1:
                              line_start = text.rfind("\n", 0, index) + 1
                              text = text[:line_start] + snippet + "\n" + text[line_start:]
                          else:
                              index = text.find("location /")
                              if index != -1:
                                  line_start = text.rfind("\n", 0, index) + 1
                                  text = text[:line_start] + snippet + "\n" + text[line_start:]
                              else:
                                  index = text.rfind("}")
                                  text = text[:index] + snippet + "\n" + text[index:]
              open(path, "w", encoding="utf-8").write(text)
          PY
            fi

            if [ -n "$NGINX_FILE" ] && ! sudo grep -q 'location /api/finance/' "$NGINX_FILE"; then
              sudo python3 /tmp/atlas-configure-nginx-finance.py "$NGINX_FILE"
            fi
            rm -f /tmp/atlas-configure-nginx-finance.py

            if [ -n "$NGINX_FILE" ] && ! sudo grep -q 'location /api/marketing/' "$NGINX_FILE"; then
              sudo python3 - "$NGINX_FILE" <<'PY'
          import sys
          path = sys.argv[1]
          text = open(path, encoding="utf-8").read()
          snippet = """

              location /api/marketing/ {
                  proxy_pass http://127.0.0.1:8787/api/marketing/;
