name: Deploy Atlas Analytics

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: atlas-analytics-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<'EOF' > ~/.ssh/deploy_key
          ${{ secrets.VPS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "/opt/atlas-analytics/deploy.sh"

      - name: Deploy content API
        shell: bash
        run: |
          scp -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            server/content-api.mjs \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/atlas-content-api.mjs"

          scp -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            server/telegram-task-store.mjs \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/atlas-telegram-task-store.mjs"

          scp -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            server/telegram-bot.mjs \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/atlas-telegram-bot.mjs"

          scp -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            server/backup-content.sh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/atlas-content-backup.sh"

          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'bash -s' <<'REMOTE'
          set -euo pipefail

          sudo mkdir -p /opt/atlas-content-api /var/lib/atlas-analytics-content /var/backups/atlas-analytics-content
          sudo mv /tmp/atlas-content-api.mjs /opt/atlas-content-api/content-api.mjs
          sudo mv /tmp/atlas-telegram-task-store.mjs /opt/atlas-content-api/telegram-task-store.mjs
          sudo mv /tmp/atlas-telegram-bot.mjs /opt/atlas-content-api/telegram-bot.mjs
          sudo mv /tmp/atlas-content-backup.sh /opt/atlas-content-api/backup-content.sh
          sudo chmod 755 /opt/atlas-content-api/backup-content.sh
          sudo chown -R root:root /opt/atlas-content-api
          sudo chown -R www-data:www-data /var/lib/atlas-analytics-content
          sudo chown -R root:root /var/backups/atlas-analytics-content
          sudo chmod 750 /var/backups/atlas-analytics-content

          sudo tee /etc/systemd/system/atlas-content-api.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Atlas Analytics Content API
          After=network.target

          [Service]
          Type=simple
          Environment=ATLAS_CONTENT_API_PORT=8787
          Environment=ATLAS_CONTENT_STORE_DIR=/var/lib/atlas-analytics-content
          ExecStart=/usr/bin/node /opt/atlas-content-api/content-api.mjs
          Restart=always
          RestartSec=3
          User=www-data
          Group=www-data

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo tee /etc/systemd/system/atlas-content-backup.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Backup Atlas Analytics CRM content
          After=atlas-content-api.service

          [Service]
          Type=oneshot
          Environment=ATLAS_CONTENT_STORE_DIR=/var/lib/atlas-analytics-content
          Environment=ATLAS_CONTENT_BACKUP_DIR=/var/backups/atlas-analytics-content
          Environment=ATLAS_CONTENT_BACKUP_RETENTION_DAYS=30
          ExecStart=/opt/atlas-content-api/backup-content.sh
          User=root
          Group=root
          SERVICE

          sudo tee /etc/systemd/system/atlas-content-backup.timer >/dev/null <<'TIMER'
          [Unit]
          Description=Daily Atlas Analytics CRM content backup

          [Timer]
          OnCalendar=*-*-* 03:20:00
          Persistent=true
          RandomizedDelaySec=10m
          Unit=atlas-content-backup.service

          [Install]
          WantedBy=timers.target
          TIMER

          sudo tee /etc/systemd/system/atlas-telegram-bot.service >/dev/null <<'SERVICE'
          [Unit]
          Description=Atlas Telegram Tasks Bot
          After=network.target atlas-content-api.service

          [Service]
          Type=simple
          EnvironmentFile=-/etc/atlas-telegram-bot.env
          Environment=ATLAS_CONTENT_STORE_DIR=/var/lib/atlas-analytics-content
          ExecStart=/usr/bin/node /opt/atlas-content-api/telegram-bot.mjs
          Restart=always
          RestartSec=5
          User=www-data
          Group=www-data

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo systemctl daemon-reload
          sudo systemctl enable --now atlas-content-api.service
          sudo systemctl restart atlas-content-api.service
          sudo systemctl enable --now atlas-telegram-bot.service
          sudo systemctl restart atlas-telegram-bot.service
          sudo systemctl enable --now atlas-content-backup.timer
          sudo systemctl start atlas-content-backup.service

          NGINX_FILE="$(sudo grep -rl 'analytics.pupanel.cc' /etc/nginx/sites-enabled /etc/nginx/conf.d 2>/dev/null | head -n 1 || true)"
          if [ -z "$NGINX_FILE" ]; then
            NGINX_FILE="$(sudo find /etc/nginx/sites-enabled /etc/nginx/conf.d -type f 2>/dev/null | head -n 1 || true)"
          fi

          if [ -n "$NGINX_FILE" ] && ! sudo grep -q 'location /api/content/' "$NGINX_FILE"; then
            sudo python3 - "$NGINX_FILE" <<'PY'
          import sys
          path = sys.argv[1]
          text = open(path, encoding="utf-8").read()
          snippet = """

              location /api/content/ {
                  proxy_pass http://127.0.0.1:8787/api/content/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  client_max_body_size 10m;
              }
          """
          marker = "location /api/content/"
          if marker not in text:
              index = text.find("location /")
              if index != -1:
                  line_start = text.rfind("\n", 0, index) + 1
                  text = text[:line_start] + snippet + "\n" + text[line_start:]
              else:
                  index = text.rfind("}")
                  text = text[:index] + snippet + "\n" + text[index:]
              open(path, "w", encoding="utf-8").write(text)
          PY
          fi

          if [ -n "$NGINX_FILE" ] && ! sudo grep -q 'location /api/telegram/' "$NGINX_FILE"; then
            sudo python3 - "$NGINX_FILE" <<'PY'
          import sys
          path = sys.argv[1]
          text = open(path, encoding="utf-8").read()
          snippet = """

              location /api/telegram/ {
                  proxy_pass http://127.0.0.1:8787/api/telegram/;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  client_max_body_size 10m;
              }
          """
          if "location /api/telegram/" not in text:
              index = text.find("location /api/content/")
              if index != -1:
                  line_start = text.rfind("\n", 0, index) + 1
                  text = text[:line_start] + snippet + "\n" + text[line_start:]
              else:
                  index = text.find("location /")
                  if index != -1:
                      line_start = text.rfind("\n", 0, index) + 1
                      text = text[:line_start] + snippet + "\n" + text[line_start:]
                  else:
                      index = text.rfind("}")
                      text = text[:index] + snippet + "\n" + text[index:]
              open(path, "w", encoding="utf-8").write(text)
          PY
          fi

          sudo nginx -t
          sudo systemctl reload nginx
          REMOTE
